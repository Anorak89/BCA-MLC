<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide Viewer | BCA Machine Learning Club</title>
    <meta name="description" content="View lecture slides and curriculum presentations for the Bergen County Academies Machine Learning Club." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="bca-favicon.png" />
    <style>
      :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #e5e5e5;
        --text-muted: #a0a0a0;
        --accent-color: #d4a373;
        --border-color: #2e2e2e;
        --font-heading: 'Playfair Display', serif;
        --font-body: 'Inter', sans-serif;
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: var(--font-body);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Navigation Header */
      header {
        background-color: rgba(18, 18, 18, 0.85);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-color);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        flex-shrink: 0;
      }

      .left-nav {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .btn-back {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
        color: var(--text-color);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 500;
        transition: var(--transition);
        padding: 0.5rem 1rem;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
      }

      .btn-back:hover {
        border-color: var(--accent-color);
        color: var(--accent-color);
        transform: translateX(-3px);
      }

      .presentation-title {
        font-family: var(--font-heading);
        font-size: 1.25rem;
        font-weight: 400;
        letter-spacing: 0.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 50vw;
      }

      .right-nav {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .btn-action {
        text-decoration: none;
        color: var(--text-muted);
        font-size: 0.85rem;
        transition: var(--transition);
        padding: 0.5rem 1rem;
        border: 1px solid transparent;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-action:hover {
        color: var(--text-color);
        border-color: var(--border-color);
        background-color: var(--card-bg);
      }

      /* Slide Container Area */
      main {
        flex-grow: 1;
        position: relative;
        width: 100%;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      iframe.loaded {
        opacity: 1;
      }

      /* Loader */
      .loader-container {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: var(--bg-color);
        gap: 1.5rem;
        transition: opacity 0.4s ease, visibility 0.4s ease;
        z-index: 5;
      }

      .loader-container.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(212, 163, 115, 0.15);
        border-top-color: var(--accent-color);
        border-radius: 50%;
        animation: spin 1s infinite linear;
      }

      .loader-text {
        font-size: 0.9rem;
        color: var(--text-muted);
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      /* Error State */
      .error-container {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
        gap: 1.5rem;
        z-index: 6;
        position: absolute;
      }

      .error-title {
        font-family: var(--font-heading);
        font-size: 2rem;
        color: var(--accent-color);
      }

      .error-desc {
        color: var(--text-muted);
        max-width: 400px;
        line-height: 1.6;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @media (max-width: 768px) {
        header {
          padding: 0.75rem 1rem;
          flex-direction: column;
          gap: 0.75rem;
          align-items: stretch;
        }

        .left-nav {
          justify-content: space-between;
        }

        .presentation-title {
          font-size: 1.1rem;
          max-width: 65vw;
        }

        .right-nav {
          justify-content: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="left-nav">
        <a href="index.html#slideshows" class="btn-back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back
        </a>
        <h1 class="presentation-title" id="slide-title">Presentation Slides</h1>
      </div>
      <div class="right-nav">
        <a href="#" id="btn-external" target="_blank" class="btn-action">
          Open in Google Slides
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </a>
      </div>
    </header>

    <main>
      <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <p class="loader-text">Loading presentation...</p>
      </div>

      <div class="error-container" id="error-screen">
        <h2 class="error-title">No Slide ID Found</h2>
        <p class="error-desc">We couldn't load the requested presentation slides because a valid presentation ID was not provided.</p>
        <a href="index.html#slideshows" class="btn-back" style="margin-top: 1rem;">Go to Home Page</a>
      </div>

      <iframe id="slide-frame" src="about:blank" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const slideId = urlParams.get("id");
        const slideTitle = urlParams.get("title");

        const frame = document.getElementById("slide-frame");
        const loader = document.getElementById("loader");
        const titleEl = document.getElementById("slide-title");
        const externalBtn = document.getElementById("btn-external");
        const errorScreen = document.getElementById("error-screen");

        if (!slideId) {
          loader.classList.add("hidden");
          errorScreen.style.display = "flex";
          frame.style.display = "none";
          return;
        }

        // Set Title
        if (slideTitle) {
          titleEl.textContent = decodeURIComponent(slideTitle);
          document.title = `${decodeURIComponent(slideTitle)} | BCA Machine Learning Club`;
        }

        // Setup External Link
        externalBtn.href = `https://docs.google.com/presentation/d/${slideId}/edit?usp=drivesdk`;

        // Load iFrame
        const embedUrl = `https://docs.google.com/presentation/d/${slideId}/embed?start=false&loop=false&delayms=3000`;
        frame.src = embedUrl;

        frame.addEventListener("load", () => {
          loader.classList.add("hidden");
          frame.classList.add("loaded");
        });
      });
    </script>
  </body>
</html>
